<svg xmlns="http://www.w3.org/2000/svg" width="720" height="380" viewBox="0 0 720 380">
  <defs>
    <style>
      .mono { font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace; }
    </style>
  </defs>

  <!-- Window background -->
  <rect width="720" height="380" rx="10" fill="#1a1e26"/>

  <!-- Title bar -->
  <rect width="720" height="38" rx="10" fill="#252b36"/>
  <rect y="28" width="720" height="10" fill="#252b36"/>
  <rect y="38" width="720" height="1" fill="#2e3649"/>

  <!-- Traffic lights -->
  <circle cx="20" cy="19" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="19" r="6" fill="#febc2e"/>
  <circle cx="60" cy="19" r="6" fill="#28c840"/>

  <!-- Tab label -->
  <text x="360" y="23" text-anchor="middle" class="mono" font-size="12" fill="#7a8aa8">main.c — hashmap demo</text>

  <!-- Code area -->
  <rect x="0" y="39" width="720" height="341" fill="#0f1319"/>

  <!-- Line numbers bg -->
  <rect x="0" y="39" width="44" height="341" fill="#0d1117"/>

  <!-- Line numbers -->
  <text x="32" y="66"  text-anchor="end" class="mono" font-size="12.5" fill="#2e3a4e"> 1</text>
  <text x="32" y="85"  text-anchor="end" class="mono" font-size="12.5" fill="#2e3a4e"> 2</text>
  <text x="32" y="104" text-anchor="end" class="mono" font-size="12.5" fill="#2e3a4e"> 3</text>
  <text x="32" y="123" text-anchor="end" class="mono" font-size="12.5" fill="#2e3a4e"> 4</text>
  <text x="32" y="142" text-anchor="end" class="mono" font-size="12.5" fill="#2e3a4e"> 5</text>
  <text x="32" y="161" text-anchor="end" class="mono" font-size="12.5" fill="#2e3a4e"> 6</text>
  <text x="32" y="180" text-anchor="end" class="mono" font-size="12.5" fill="#2e3a4e"> 7</text>
  <text x="32" y="199" text-anchor="end" class="mono" font-size="12.5" fill="#2e3a4e"> 8</text>
  <text x="32" y="218" text-anchor="end" class="mono" font-size="12.5" fill="#2e3a4e"> 9</text>
  <text x="32" y="237" text-anchor="end" class="mono" font-size="12.5" fill="#2e3a4e">10</text>
  <text x="32" y="256" text-anchor="end" class="mono" font-size="12.5" fill="#2e3a4e">11</text>
  <text x="32" y="275" text-anchor="end" class="mono" font-size="12.5" fill="#2e3a4e">12</text>
  <text x="32" y="294" text-anchor="end" class="mono" font-size="12.5" fill="#2e3a4e">13</text>
  <text x="32" y="313" text-anchor="end" class="mono" font-size="12.5" fill="#2e3a4e">14</text>
  <text x="32" y="332" text-anchor="end" class="mono" font-size="12.5" fill="#2e3a4e">15</text>
  <text x="32" y="351" text-anchor="end" class="mono" font-size="12.5" fill="#2e3a4e">16</text>
  <text x="32" y="370" text-anchor="end" class="mono" font-size="12.5" fill="#2e3a4e">17</text>

  <!-- Code separator line -->
  <line x1="44" y1="39" x2="44" y2="380" stroke="#1e2535" stroke-width="1"/>

  <!-- #include -->
  <text x="56" y="66" class="mono" font-size="12.5">
    <tspan fill="#f472b6">#include </tspan><tspan fill="#4ade80">"hashmap.h"</tspan>
  </text>

  <!-- blank -->

  <!-- int main -->
  <text x="56" y="104" class="mono" font-size="12.5">
    <tspan fill="#22d3ee">int </tspan><tspan fill="#fbbf24">main</tspan><tspan fill="#94a3b8">() {</tspan>
  </text>

  <!-- HashMap *dict = hashmap_create(); -->
  <text x="56" y="123" class="mono" font-size="12.5">
    <tspan fill="#7a8aa8">    </tspan><tspan fill="#22d3ee">HashMap </tspan><tspan fill="#94a3b8">*</tspan><tspan fill="#e2e8f0">dict </tspan><tspan fill="#94a3b8">= </tspan><tspan fill="#fbbf24">hashmap_create</tspan><tspan fill="#94a3b8">();</tspan>
  </text>

  <!-- blank -->

  <!-- hashmap_add string string -->
  <text x="56" y="161" class="mono" font-size="12.5">
    <tspan fill="#fbbf24">    hashmap_add</tspan><tspan fill="#94a3b8">(</tspan><tspan fill="#e2e8f0">dict</tspan><tspan fill="#94a3b8">, </tspan><tspan fill="#4ade80">"name"</tspan><tspan fill="#94a3b8">, </tspan><tspan fill="#4ade80">"Alice"</tspan><tspan fill="#94a3b8">);</tspan>
  </text>

  <!-- hashmap_add string int -->
  <text x="56" y="180" class="mono" font-size="12.5">
    <tspan fill="#fbbf24">    hashmap_add</tspan><tspan fill="#94a3b8">(</tspan><tspan fill="#e2e8f0">dict</tspan><tspan fill="#94a3b8">, </tspan><tspan fill="#4ade80">"score"</tspan><tspan fill="#94a3b8">, </tspan><tspan fill="#fb923c">9800</tspan><tspan fill="#94a3b8">);</tspan>
  </text>

  <!-- hashmap_add int float -->
  <text x="56" y="199" class="mono" font-size="12.5">
    <tspan fill="#fbbf24">    hashmap_add</tspan><tspan fill="#94a3b8">(</tspan><tspan fill="#e2e8f0">dict</tspan><tspan fill="#94a3b8">, </tspan><tspan fill="#fb923c">42</tspan><tspan fill="#94a3b8">, </tspan><tspan fill="#fb923c">3.14f</tspan><tspan fill="#94a3b8">);</tspan>
  </text>

  <!-- blank -->

  <!-- HashMapVariant *v = hashmap_get -->
  <text x="56" y="237" class="mono" font-size="12.5">
    <tspan fill="#22d3ee">    HashMapVariant </tspan><tspan fill="#94a3b8">*</tspan><tspan fill="#e2e8f0">v </tspan><tspan fill="#94a3b8">= </tspan><tspan fill="#fbbf24">hashmap_get</tspan><tspan fill="#94a3b8">(</tspan><tspan fill="#e2e8f0">dict</tspan><tspan fill="#94a3b8">, </tspan><tspan fill="#4ade80">"name"</tspan><tspan fill="#94a3b8">);</tspan>
  </text>

  <!-- if (v) printf -->
  <text x="56" y="256" class="mono" font-size="12.5">
    <tspan fill="#a78bfa">    if </tspan><tspan fill="#94a3b8">(</tspan><tspan fill="#e2e8f0">v</tspan><tspan fill="#94a3b8">) </tspan><tspan fill="#fbbf24">printf</tspan><tspan fill="#94a3b8">(</tspan><tspan fill="#4ade80">"%s\n"</tspan><tspan fill="#94a3b8">, </tspan><tspan fill="#e2e8f0">v</tspan><tspan fill="#94a3b8">-&gt;</tspan><tspan fill="#e2e8f0">as.str</tspan><tspan fill="#94a3b8">);</tspan>
  </text>

  <!-- blank -->

  <!-- hashmap_del -->
  <text x="56" y="294" class="mono" font-size="12.5">
    <tspan fill="#fbbf24">    hashmap_del</tspan><tspan fill="#94a3b8">(</tspan><tspan fill="#e2e8f0">dict</tspan><tspan fill="#94a3b8">, </tspan><tspan fill="#4ade80">"score"</tspan><tspan fill="#94a3b8">);</tspan>
  </text>

  <!-- hashmap_destroy -->
  <text x="56" y="313" class="mono" font-size="12.5">
    <tspan fill="#fbbf24">    hashmap_destroy</tspan><tspan fill="#94a3b8">(</tspan><tspan fill="#e2e8f0">dict</tspan><tspan fill="#94a3b8">);</tspan>
  </text>

  <!-- return 0 -->
  <text x="56" y="332" class="mono" font-size="12.5">
    <tspan fill="#a78bfa">    return </tspan><tspan fill="#fb923c">0</tspan><tspan fill="#94a3b8">;</tspan>
  </text>

  <!-- } -->
  <text x="56" y="351" class="mono" font-size="12.5" fill="#94a3b8">}</text>
</svg>
