<svg xmlns="http://www.w3.org/2000/svg" width="720" height="300" viewBox="0 0 720 300">
  <defs>
    <style>.mono { font-family: 'JetBrains Mono', 'Fira Code', monospace; }</style>
  </defs>

  <!-- Window -->
  <rect width="720" height="300" rx="10" fill="#1a1e26"/>
  <rect width="720" height="38" rx="10" fill="#252b36"/>
  <rect y="28" width="720" height="10" fill="#252b36"/>
  <rect y="38" width="720" height="1" fill="#2e3649"/>

  <!-- Traffic lights -->
  <circle cx="20" cy="19" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="19" r="6" fill="#febc2e"/>
  <circle cx="60" cy="19" r="6" fill="#28c840"/>
  <text x="360" y="23" text-anchor="middle" class="mono" font-size="12" fill="#7a8aa8">Terminal — iterator &amp; mixed key types</text>

  <!-- Body -->
  <rect x="0" y="39" width="720" height="261" fill="#0d1117"/>

  <!-- Comment line -->
  <text x="20" y="70" class="mono" font-size="12.5" fill="#4a5a70">// Insert keys of different types</text>

  <!-- Code line 1 -->
  <text x="20" y="92" class="mono" font-size="12.5">
    <tspan fill="#fbbf24">hashmap_add</tspan><tspan fill="#94a3b8">(dict, </tspan><tspan fill="#4ade80">"lang"</tspan><tspan fill="#94a3b8">,  </tspan><tspan fill="#4ade80">"C11"</tspan><tspan fill="#94a3b8">);</tspan>
  </text>
  <text x="20" y="111" class="mono" font-size="12.5">
    <tspan fill="#fbbf24">hashmap_add</tspan><tspan fill="#94a3b8">(dict, </tspan><tspan fill="#fb923c">1024</tspan><tspan fill="#94a3b8">,    </tspan><tspan fill="#4ade80">"cache"</tspan><tspan fill="#94a3b8">);</tspan>
  </text>
  <text x="20" y="130" class="mono" font-size="12.5">
    <tspan fill="#fbbf24">hashmap_add</tspan><tspan fill="#94a3b8">(dict, </tspan><tspan fill="#fb923c">2.718</tspan><tspan fill="#94a3b8">,   </tspan><tspan fill="#4ade80">"euler"</tspan><tspan fill="#94a3b8">);</tspan>
  </text>

  <!-- Divider -->
  <line x1="20" y1="147" x2="700" y2="147" stroke="#1e2535" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Comment -->
  <text x="20" y="168" class="mono" font-size="12.5" fill="#4a5a70">// hashmap_iter output:</text>

  <!-- iter output entries -->
  <text x="20" y="190" class="mono" font-size="12.5">
    <tspan fill="#94a3b8">key=</tspan><tspan fill="#4ade80">"lang"</tspan>
    <tspan fill="#94a3b8">   →  value=</tspan><tspan fill="#4ade80">"C11"</tspan>
  </text>
  <text x="20" y="209" class="mono" font-size="12.5">
    <tspan fill="#94a3b8">key=</tspan><tspan fill="#fb923c">1024</tspan>
    <tspan fill="#94a3b8">      →  value=</tspan><tspan fill="#4ade80">"cache"</tspan>
  </text>
  <text x="20" y="228" class="mono" font-size="12.5">
    <tspan fill="#94a3b8">key=</tspan><tspan fill="#fb923c">2.718000</tspan>
    <tspan fill="#94a3b8">  →  value=</tspan><tspan fill="#4ade80">"euler"</tspan>
  </text>

  <!-- contains check -->
  <line x1="20" y1="242" x2="700" y2="242" stroke="#1e2535" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="20" y="263" class="mono" font-size="12.5">
    <tspan fill="#fbbf24">hashmap_contains</tspan><tspan fill="#94a3b8">(dict, </tspan><tspan fill="#4ade80">"lang"</tspan><tspan fill="#94a3b8">)  →  </tspan><tspan fill="#4ade80">1 (true)</tspan>
  </text>
  <text x="20" y="282" class="mono" font-size="12.5">
    <tspan fill="#fbbf24">hashmap_contains</tspan><tspan fill="#94a3b8">(dict, </tspan><tspan fill="#4ade80">"miss"</tspan><tspan fill="#94a3b8">)  →  </tspan><tspan fill="#f87171">0 (false)</tspan>
  </text>
</svg>
