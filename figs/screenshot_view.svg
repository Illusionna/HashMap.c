<svg xmlns="http://www.w3.org/2000/svg" width="720" height="340" viewBox="0 0 720 340">
  <defs>
    <style>.mono { font-family: 'JetBrains Mono', 'Fira Code', monospace; }</style>
  </defs>

  <!-- Window -->
  <rect width="720" height="340" rx="10" fill="#1a1e26"/>
  <rect width="720" height="38" rx="10" fill="#252b36"/>
  <rect y="28" width="720" height="10" fill="#252b36"/>
  <rect y="38" width="720" height="1" fill="#2e3649"/>

  <!-- Traffic lights -->
  <circle cx="20" cy="19" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="19" r="6" fill="#febc2e"/>
  <circle cx="60" cy="19" r="6" fill="#28c840"/>
  <text x="360" y="23" text-anchor="middle" class="mono" font-size="12" fill="#7a8aa8">Terminal — hashmap_print_view()</text>

  <!-- Terminal body -->
  <rect x="0" y="39" width="720" height="301" fill="#0d1117"/>

  <!-- Prompt line -->
  <text x="20" y="70" class="mono" font-size="13">
    <tspan fill="#4ade80">❯ </tspan><tspan fill="#e2e8f0">./demo</tspan>
  </text>

  <!-- Bucket 0 -->
  <text x="20" y="95" class="mono" font-size="12.5">
    <tspan fill="#94a3b8">[</tspan><tspan fill="#ffffff"> 0</tspan><tspan fill="#94a3b8">] = </tspan><tspan fill="#94a3b8">(null)</tspan>
  </text>
  <!-- Bucket 1 -->
  <text x="20" y="114" class="mono" font-size="12.5">
    <tspan fill="#94a3b8">[</tspan><tspan fill="#ffffff"> 1</tspan><tspan fill="#94a3b8">] = {</tspan><tspan fill="#4ade80">"name"</tspan><tspan fill="#94a3b8">: </tspan><tspan fill="#4ade80">"Alice"</tspan><tspan fill="#94a3b8">} -&gt; (null)</tspan>
  </text>
  <!-- Bucket 2 -->
  <text x="20" y="133" class="mono" font-size="12.5">
    <tspan fill="#94a3b8">[</tspan><tspan fill="#ffffff"> 2</tspan><tspan fill="#94a3b8">] = </tspan><tspan fill="#94a3b8">(null)</tspan>
  </text>
  <!-- Bucket 3 -->
  <text x="20" y="152" class="mono" font-size="12.5">
    <tspan fill="#94a3b8">[</tspan><tspan fill="#ffffff"> 3</tspan><tspan fill="#94a3b8">] = {</tspan><tspan fill="#fb923c">42</tspan><tspan fill="#94a3b8">: </tspan><tspan fill="#fb923c">3.140000</tspan><tspan fill="#94a3b8">} -&gt; (null)</tspan>
  </text>
  <!-- Bucket 4 -->
  <text x="20" y="171" class="mono" font-size="12.5">
    <tspan fill="#94a3b8">[</tspan><tspan fill="#ffffff"> 4</tspan><tspan fill="#94a3b8">] = </tspan><tspan fill="#94a3b8">(null)</tspan>
  </text>
  <!-- Bucket 5 -->
  <text x="20" y="190" class="mono" font-size="12.5">
    <tspan fill="#94a3b8">[</tspan><tspan fill="#ffffff"> 5</tspan><tspan fill="#94a3b8">] = {</tspan><tspan fill="#4ade80">"score"</tspan><tspan fill="#94a3b8">: </tspan><tspan fill="#fb923c">9800</tspan><tspan fill="#94a3b8">} -&gt; (null)</tspan>
  </text>
  <!-- Bucket 6 -->
  <text x="20" y="209" class="mono" font-size="12.5">
    <tspan fill="#94a3b8">[</tspan><tspan fill="#ffffff"> 6</tspan><tspan fill="#94a3b8">] = </tspan><tspan fill="#94a3b8">(null)</tspan>
  </text>
  <!-- Bucket 7 -->
  <text x="20" y="228" class="mono" font-size="12.5">
    <tspan fill="#94a3b8">[</tspan><tspan fill="#ffffff"> 7</tspan><tspan fill="#94a3b8">] = </tspan><tspan fill="#94a3b8">(null)</tspan>
  </text>

  <!-- Divider -->
  <line x1="20" y1="242" x2="700" y2="242" stroke="#1e2535" stroke-width="1"/>

  <!-- Stats line 1 -->
  <text x="20" y="262" class="mono" font-size="12.5">
    <tspan fill="#94a3b8">Buckets = </tspan><tspan fill="#ffffff">8</tspan>
    <tspan fill="#94a3b8"> | Count = </tspan><tspan fill="#ffffff">3</tspan>
    <tspan fill="#94a3b8"> | Load = </tspan><tspan fill="#ffffff">37.500%</tspan>
    <tspan fill="#94a3b8"> | Memory Usage</tspan>
  </text>

  <!-- Stats line 2 -->
  <text x="20" y="281" class="mono" font-size="12.5">
    <tspan fill="#94a3b8">HashMap Struct = </tspan><tspan fill="#ffffff">32 B</tspan>
    <tspan fill="#94a3b8">  |  Bucket Table = </tspan><tspan fill="#ffffff">64 B</tspan>
    <tspan fill="#94a3b8">  |  Node = </tspan><tspan fill="#ffffff">144 B</tspan>
  </text>

  <!-- Stats line 3 -->
  <text x="20" y="300" class="mono" font-size="12.5">
    <tspan fill="#94a3b8">String Heap = </tspan><tspan fill="#ffffff">18 B</tspan>
    <tspan fill="#94a3b8">  |  Total = </tspan><tspan fill="#ffffff">258 B</tspan>
    <tspan fill="#94a3b8"> (</tspan><tspan fill="#4ade80">258 B</tspan><tspan fill="#94a3b8">)</tspan>
  </text>

  <!-- Cursor -->
  <text x="20" y="323" class="mono" font-size="13">
    <tspan fill="#4ade80">❯ </tspan>
  </text>
  <rect x="38" y="310" width="8" height="14" fill="#4ade80" opacity="0.85">
    <animate attributeName="opacity" values="0.85;0;0.85" dur="1.1s" repeatCount="indefinite"/>
  </rect>
</svg>
